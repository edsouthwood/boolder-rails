          title: The beginner's guide to bouldering in Dartmoor
      table_of_contents: Go back
      beginners_guide:
        title: Beginner's guide
        subtitle: Discover bouldering in Dartmoor
        equipment: 
          title: Equipment
          intro: Here is the equipment you will need to climb outdoors.
          shoes: Climbing shoes
          crashpad: A crash mat
          crashpad_description: A crash mat is designed to soften your fall.
          crashpad_tip: We recommend you use a thick one with a large surface, even if it's a bit more bulky.
          guidebook: A guidebook
          guidebook_description_html: A guidebook will help you find and identify problems in a climbing area.
          optional: And also
          optional_item1_html: a <strong>doormat</strong> (or a rag), to clean your shoes before starting a problem
          optional_item2_html: <strong>additional crash mats</strong>, see <a href="%{path}">“Climb safely”</a>
          optional_item3_html: some <strong>chalk</strong> (to be used sparingly!), see <a href="%{path}">“Rules of good conduct”</a>
          optional_item4_html: a <strong>soft brush</strong> to clean the rock and remove chalk marks
          other_tips: Also, feel free to take a sports outfit that doesn't restrict your movements too much, and some food and water.
          metas:
            title: The equipment you need for outdoor bouldering
        choose_area: 
          title: Choose an area
          beginner_friendly_areas: Areas suited for beginners
          p1_html: "Here is a selection of areas to discover Dartmoor gently:"
          p3_html: All these areas have a yellow/orange <strong>circuit</strong> that is <strong>suited for beginners</strong> and marked with a 
          p4_html: They offer lots of easy problems (graded 1, 2 or 3), with low boulders (less than 3 meters high) and with good landings.
          all_areas: See all areas
          metas:
            title: How to choose an area suited for beginners in Dartmoor
        choose_problems: 
          title: Choose problems
          intro: Once you get to a bouldering area, here are a few tips to easily find problems adapted to you.
          filter_by_level: Filter by level
          filter_by_level_p1_html: Thanks to the <a href="%{path}">Boolder app</a>, you can filter problems that match with your level.
          filter_by_level_p2: This way you can identify the zones with a good density of problems adapted to your level.
          filter_by_level_warning: "Careful: the grade 4a in Dartmoor is roughly equivalent to 5a elsewhere."
          filter_by_level_warning2: Don't overestimate yourself ;)
          circuit: Follow a circuit
          circuit_p1: Circuits are a series of boulders of (relatively) homogeneous level, with ascending numbers.
          circuit_p2: Each problem is represented by a colored number and an arrow, painted directly on the boulder.
          circuit_p3: There are 5 main colors (yellow, orange, blue, red, and white/black) that correspond to increasing grades.
          circuit_p4_html: By following a yellow circuit (or an orange one) you'll be able to discover problems graded between 1 and 3, which is perfect to start.
          circuit_p5_html: "Tip: pick a <strong>circuit suited for beginners</strong>, marked with a "
          circuit_p6_html: They offer lots of easy problems (graded 1, 2 or 3), with low boulders (less than 3 meters high) and with good landings.
          metas:
            title: How to choose problems in Dartmoor
        climb_safely: 
          title: Climb safely
          intro: Here are a few tips to decrease the risks of injury.
          avoid_risky_problems: Avoid risky problems
          avoid_risky_problems_p1_html: As a beginner, prefer problems that are <strong>less than 3 or 4 meters high</strong> and with a <strong>good landing</strong> (even ground, with no rocks/roots/etc)
          height: "Height:"
          good_landing: Landing on even ground (sand)
          bad_landing: Difficult landing
          safe: Perfect to climb with confidence
          unsafe: To avoid
          multi_crashpad: Take several crash mats
          multi_crashpad_p1: It can be reassuring to have several crash mats to cover a larger surface on the ground.
          multi_crashpad_p2: If you climb with a group, you can also ask your friends to move the crash mat while you're climbing, so that it always stays right below you.
          spot: Have a spotter
          spot_p1_html: To help your friends climb safely, you can offer to be the <i>spotter</i>.
          spot_p2: The spotter redirects the climber's fall to land safely on the crash mat.
          spot_p3: "Careful: don't try to catch the climber yourself, you migh injure yourself!"
          descent: Anticipate the descent
          descent_p1: It can sometimes be tricky to go down from a boulder once you're on top. Check the descent beforehand — especially if you're alone!
          metas:
            title: Safety tips for outdoor bouldering
        rules:
          title: Rules of good conduct
          intro: Dartmoor is a National Park and a working landscape. Please respect the environment, local farmers, and wildlife so that we can all continue to enjoy access to these incredible boulders.
          chalk: Use chalk sparingly
          chalk_p1: Chalk can leave visible marks on Dartmoor's granite and is unsightly in a National Park setting. Use it sparingly, and consider liquid chalk as a lower-impact alternative.
          chalk_p2: When you're done, brush the holds with a soft brush to remove chalk residue and keep the rock looking natural.
          clean_shoes: Clean your shoes
          clean_shoes_p1: Mud and vegetation on your shoes can both damage friction on the rock and spread invasive species between sites.
          clean_shoes_p2: Clean your shoes on a doormat or brush before you start climbing, especially if you've been walking across boggy ground.
          rain: Wet rock is dangerous
          rain_p1: Unlike sandstone, Dartmoor's granite is not damaged by rain and does not require a drying period to protect the rock itself.
          rain_p2: However, wet granite becomes extremely slippery and significantly increases the risk of falls and injury. Wait for the rock to dry before climbing — both for your safety and to avoid damaging the lichen that grows on unclimbed surfaces.
          other_rules: Other rules
          other_rules_item1: Walk on existing trails and avoid trampling vegetation — Dartmoor's moorland and bog habitats are delicate and slow to recover.
          other_rules_item2: Carry your crash mat rather than dragging it across the ground.
          other_rules_item3: Take all your litter home with you — and consider picking up any you find along the way.
          other_rules_item4: "Fire risk on Dartmoor is extremely high. Open fires and BBQs are prohibited — this includes disposable BBQs. One spark can destroy thousands of acres of moorland."
          other_rules_item5_html: Keep dogs under close control around livestock. Dartmoor is a working farm — cattle and sheep graze freely across the moor year-round.
          video: In video
          metas:
            title: Rules of good conduct
